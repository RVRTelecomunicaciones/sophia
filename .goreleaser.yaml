# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
version: 2

project_name: sophia

before:
  hooks:
    - go mod tidy
    - go vet ./...

builds:
  - id: sophia
    main: ./cmd/sophia
    binary: sophia
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/RVRTelecomunicaciones/sophia/internal/bootstrap.Version={{.Version}}
      - -X github.com/RVRTelecomunicaciones/sophia/internal/bootstrap.Commit={{.Commit}}
      - -X github.com/RVRTelecomunicaciones/sophia/internal/bootstrap.BuildDate={{.Date}}

archives:
  - id: default
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats: [tar.gz]
    files:
      - LICENSE
      - README.md
      - CHANGELOG.md

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

snapshot:
  # Hardcoded base — incpatch needs a semver tag, but the working repo carries
  # non-semver milestone tags (m1-foundation … m9-hardening-release-prep).
  # After v0.1.0 ships, future snapshots could move to "{{ incpatch .Version }}-…".
  version_template: "0.0.1-snapshot-{{ .ShortCommit }}"

release:
  github:
    owner: RVRTelecomunicaciones
    name: sophia
  draft: false
  prerelease: auto
  name_template: "{{.ProjectName}} v{{.Version}}"

changelog:
  use: github
  sort: asc
  groups:
    - title: Features
      regexp: '^.*?feat(\([\w]+\))??!?:.+$'
      order: 0
    - title: Bug fixes
      regexp: '^.*?fix(\([\w]+\))??!?:.+$'
      order: 1
    - title: Other
      order: 999

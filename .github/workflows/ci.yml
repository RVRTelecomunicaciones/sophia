name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-test-lint:
    name: build, test, lint
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'
          cache: true

      - name: go vet
        run: go vet ./...

      - name: go build
        run: go build ./...

      - name: go test
        run: go test ./... -race

      - name: coverage
        run: |
          go test -coverprofile=cover.out ./internal/domain/... ./internal/application/...
          go tool cover -func=cover.out | tail -n 1

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          # NOTE: pinned to v1.64 to match the local .golangci.yml v1 schema.
          # Migrating the config to v2 + bumping the action is deferred to M10.
          version: v1.64
          args: --timeout=3m

  vuln:
    name: govulncheck
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'
          cache: true

      - name: install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: run govulncheck
        run: govulncheck ./...

  security:
    name: gosec
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'
          cache: true

      - name: gosec
        uses: securego/gosec@master
        with:
          args: '-severity high -quiet ./...'
